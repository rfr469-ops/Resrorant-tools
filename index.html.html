<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة FAROUK GRUP الشاملة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { font-family: 'Tajawal', sans-serif; margin: 0; background: #f0f2f5; overflow: hidden; }
        
        .top-bar {
            background: #1a1a1a; color: white; padding: 10px 20px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 3px solid #b8860b; height: 70px; box-sizing: border-box;
        }

        .logo-area { display: flex; align-items: center; gap: 10px; }
        .logo-area h1 { font-size: 1.1rem; color: #b8860b; margin: 0; }

        .selector-container { display: flex; align-items: center; gap: 15px; background: #222; padding: 5px 20px; border-radius: 50px; border: 1px solid #444; }
        .selector-container label { font-size: 0.9rem; color: #ddd; }
        
        select {
            background: #fff; border: none; padding: 7px 15px; border-radius: 20px;
            font-family: 'Tajawal'; font-weight: bold; cursor: pointer; min-width: 250px;
        }

        /* حاوية العرض */
        #content-viewer {
            width: 100%;
            height: calc(100vh - 70px);
            border: none;
            background: white;
        }

        .loading-overlay {
            position: fixed; top: 70px; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8); display: none; justify-content: center; align-items: center;
            z-index: 100; font-weight: bold; color: #b8860b;
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="logo-area">
        <i class="fas fa-chart-pie" style="color:#b8860b; font-size: 1.5rem;"></i>
        <h1>مجموعة فاروق | النظام المدمج</h1>
    </div>

    <div class="selector-container">
        <label>اختر نوع الحاسبة:</label>
        <select id="toolSelect" onchange="loadTool(this.value)">
            <option value="tool1.html">1. حاسبة تكاليف المطاعم</option>
            <option value="tool2.html">2. دراسة الجدوى الفنية</option>
            <option value="tool3.html">3. الجدوى التسويقية</option>
            <option value="tool4.html">4. حاسبة نقطة التعادل</option>
            <option value="tool5.html">5. التدفق النقدي</option>
            <option value="tool6.html">6. تكلفة العمالة</option>
            <option value="tool7.html">7. حاسبة الإهلاك</option>
            <option value="tool8.html">8. تدقيق سلامة الغذاء HACCP</option>
            <option value="tool9.html">9. تدقيق إجراءات التشغيل SOPs</option>
        </select>
    </div>
</div>

<div id="loader" class="loading-overlay">جاري تحميل الأداة...</div>
<iframe id="content-viewer" src="tool1.html"></iframe>

<script>
    function loadTool(fileName) {
        const viewer = document.getElementById('content-viewer');
        const loader = document.getElementById('loader');
        
        loader.style.display = 'flex';
        
        // تحديث الرابط
        viewer.src = fileName;

        // إخفاء التحميل عند الانتهاء
        viewer.onload = function() {
            loader.style.display = 'none';
        };

        // فحص الخطأ (إذا كان الملف غير موجود)
        viewer.onerror = function() {
            alert("خطأ: لم يتم العثور على الملف " + fileName + "\nتأكد من وجوده في نفس المجلد وبنفس الاسم.");
            loader.style.display = 'none';
        };
    }
</script>

</body>
</html>
